<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madness Z - Dedicated Server Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px #00ff00;
        }

        .status-panel {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
        }

        #status-text { font-weight: bold; color: #ff3333; }
        #room-code-display { font-size: 24px; color: #00ffff; margin-top: 10px; display: block;}

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input {
            background: #222;
            border: 1px solid #555;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            text-transform: uppercase;
            outline: none;
        }

        input:focus { border-color: #00ff00; }

        button {
            background: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover { background: #00ff00; color: #000; }
        button:disabled { background: #333; color: #777; border-color: #555; cursor: not-allowed; }

        .log-console {
            background: #000;
            border: 1px solid #333;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            color: #aaa;
        }

        .log-entry { margin-bottom: 4px; border-bottom: 1px dashed #222; padding-bottom: 2px; }
        .log-time { color: #555; }
        .log-info { color: #00ffff; }
        .log-success { color: #00ff00; }
        .log-warn { color: #ffaa00; }
        
        .players-list {
            margin-top: 15px;
            font-size: 14px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SERVIDOR DEDICADO BOT</h1>
        
        <div class="status-panel">
            STATUS: <span id="status-text">OFFLINE</span>
            <span id="room-code-display">SALA: ----</span>
        </div>

        <div class="input-group">
            <input type="text" id="custom-code" placeholder="CÓDIGO (EX: MDZ-1234)">
            <button id="btn-start">INICIAR SERVIDOR</button>
        </div>

        <div class="log-console" id="log-console"></div>

        <div class="players-list">
            JOGADORES CONECTADOS: <span id="player-count">0</span>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const btnStart = document.getElementById("btn-start");
        const customCodeInput = document.getElementById("custom-code");
        const statusText = document.getElementById("status-text");
        const roomCodeDisplay = document.getElementById("room-code-display");
        const consoleEl = document.getElementById("log-console");
        const playerCountEl = document.getElementById("player-count");

        let peer = null;
        let peerConnections = [];
        let otherPlayers = {};
        let hostLoop = null;

        // O Jogador BOT Falso que ficará no céu
        const botPlayer = {
            name: "[BOT] SERVIDOR",
            x: 10000, 
            y: -5000, // No céu, longe de tudo
            hp: 99999, // Imortal
            walkCycle: 0,
            currentWeapon: null,
            reserveWeapon: null,
            dir: 1,
            aimAngle: 0,
            outfit: { hat: 8, shirt: 7, pants: 5, shoes: 5, hair: 5 }, // Skin de Demônio de Terno
            currentInterior: false,
            width: 30, height: 55
        };

        function log(message, type = "info") {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement("div");
            div.className = "log-entry";
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function updatePlayerCount() {
            playerCountEl.innerText = peerConnections.length;
        }

        btnStart.addEventListener("click", () => {
            let roomCode = customCodeInput.value.trim().toUpperCase();
            if (!roomCode) {
                roomCode = "MDZ-" + Math.floor(Math.random() * 9000 + 1000);
            }

            log("Inicializando PeerJS...", "warn");
            btnStart.disabled = true;
            customCodeInput.disabled = true;

            peer = new Peer(roomCode);

            peer.on('open', (id) => {
                log(`Servidor aberto com sucesso! Código: ${id}`, "success");
                statusText.innerText = "ONLINE";
                statusText.style.color = "#00ff00";
                roomCodeDisplay.innerText = "SALA: " + id;
                startHostLoop();
            });

            peer.on('connection', (conn) => {
                log(`Novo jogador conectando: ${conn.peer}`, "info");
                
                // Limite de jogadores
                if (peerConnections.length >= 11) {
                    log(`Conexão recusada (Servidor Cheio): ${conn.peer}`, "warn");
                    conn.close();
                    return;
                }

                peerConnections.push(conn);
                updatePlayerCount();

                conn.on('open', () => {
                    log(`Jogador entrou no mundo: ${conn.peer}`, "success");
                    // Envia um world_sync vazio para não bugar as casas originais do player
                    conn.send({ type: 'world_sync', houses: [], tents: [], campfires: [], drops: [] });
                });

                conn.on('data', (data) => {
                    // Recebe e guarda os movimentos dos jogadores reais
                    if (data.type === 'player_update') {
                        otherPlayers[conn.peer] = data.player;
                    } 
                    // Repassa o dano caso um jogador ataque o outro
                    else if (data.type === 'route_damage') {
                        let targetConn = peerConnections.find(c => c.peer === data.target);
                        if (targetConn) targetConn.send({ type: 'take_damage', amount: data.amount });
                        log(`Repassando dano de ${conn.peer} para ${data.target}`, "warn");
                    }
                });

                conn.on('close', () => {
                    log(`Jogador desconectou: ${conn.peer}`, "warn");
                    peerConnections = peerConnections.filter(c => c.peer !== conn.peer);
                    delete otherPlayers[conn.peer];
                    updatePlayerCount();
                });
            });

            peer.on('error', (err) => {
                log(`ERRO: ${err.type} - ${err.message}`, "warn");
                if(err.type === 'unavailable-id') {
                    btnStart.disabled = false;
                    customCodeInput.disabled = false;
                }
            });
        });

        // Loop de Atualização do Servidor (Roda a 20 ticks por segundo, igual ao jogo original)
        function startHostLoop() {
            if(hostLoop) clearInterval(hostLoop);
            
            hostLoop = setInterval(() => {
                // Insere o Bot na lista de jogadores para que ele apareça no mapa dos outros
                otherPlayers['HOST'] = botPlayer;

                // Monta o pacote de host
                let hostPayload = {
                    type: 'host_update', 
                    players: otherPlayers,
                    zombies: [], // O bot deixa a cargo do jogo local do jogador gerar os zumbis
                    drops: [],
                    shots: []
                };

                // Dispara para todos os conectados
                peerConnections.forEach(c => {
                    if(c.open) c.send(hostPayload);
                });
            }, 50);
        }
    </script>
</body>
</html>
